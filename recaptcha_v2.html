<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>reCAPTCHA v2 Demo</title>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body>

<div
  class="g-recaptcha"
  data-sitekey="6Lf5t4UsAAAAAKlfoyT4Uf5YY82gVmASFg9uhiS6"
  data-callback="onRecaptchaSuccess">
</div>

<script>
function sendTokenToFlutter(token) {
  if (window.flutter_inappwebview) {
    window.flutter_inappwebview.callHandler('recaptchaToken', token);
  } else {
    setTimeout(() => sendTokenToFlutter(token), 100);
  }
}

window.addEventListener("flutterInAppWebViewPlatformReady", function() {
  console.log("Flutter bridge ready");
});

function onRecaptchaSuccess(token) {
  console.log("Recaptcha token:", token);
  sendTokenToFlutter(token);
}
</script>

</body>
</html>
