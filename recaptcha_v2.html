<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <title>reCAPTCHA v2 Demo</title>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body>

<div
  class="g-recaptcha"
  data-sitekey="6Lf5t4UsAAAAAKlfoyT4Uf5YY82gVmASFg9uhiS6"
  data-callback="onRecaptchaSuccess">
</div>

<script>

let bridgeReady = false;

// Flutter bridge ready event
window.addEventListener("flutterInAppWebViewPlatformReady", function() {
  bridgeReady = true;
});

function onRecaptchaSuccess(token) {

  console.log("Recaptcha token:", token);

  function sendToken() {

    if (bridgeReady && window.flutter_inappwebview) {
      window.flutter_inappwebview.callHandler('recaptchaToken', token);
    } else {
      setTimeout(sendToken, 100);
    }

  }

  sendToken();
}

</script>

</body>
</html>
